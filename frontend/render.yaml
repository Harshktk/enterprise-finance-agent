services:
  - type: web
    name: enterprise-finance-agent-ui
    env: static
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    envVars:
      - key: VITE_API_URL
        value: https://your-backend.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
