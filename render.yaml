services:
  - type: web
    name: enterprise-finance-agent
    env: docker
    dockerCommand: uvicorn app.main:app --host 0.0.0.0 --port 8000
    image:
      url: docker.io/YOUR_DOCKERHUB_USERNAME/enterprise-finance-agent:latest
    plan: free
    healthCheckPath: /
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: finance-db
          property: connectionString
      - key: LLM_PROVIDER
        value: mock
      - key: PYTHONDONTWRITEBYTECODE
        value: "1"
      - key: PYTHONUNBUFFERED
        value: "1"

databases:
  - name: finance-db
    plan: free
    databaseName: finance_db
    user: finance_user
